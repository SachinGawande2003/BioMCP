name: Live Contract Smoke

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

jobs:
  live-contract:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run public live contract smoke
        run: python scripts/live_contract_smoke.py --output live_contract_results.json
        env:
          BIOMCP_CT_403_RETRY_DELAY: "1"
          NCBI_API_KEY: ${{ secrets.NCBI_API_KEY }}

      - name: Upload live contract report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: live-contract-results
          path: live_contract_results.json
